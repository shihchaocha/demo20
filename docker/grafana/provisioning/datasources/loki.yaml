apiVersion: 1
datasources:
  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    jsonData:
      # Extract traceId from log lines and provide a link to Tempo
      # Our log format: INFO [service-name,{32hex traceId},{16hex spanId}] ...
      derivedFields:
        - datasourceName: Tempo
          datasourceUid: tempo
          matcherRegex: '\[[^,]+,([0-9a-f]{32}),'
          name: TraceID
          url: '${__value.raw}'
          urlDisplayLabel: View Trace in Tempo
