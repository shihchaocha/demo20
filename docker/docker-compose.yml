services:

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: demo_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./data.sql:/docker-entrypoint-initdb.d/02-data.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME: localhost
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "(echo >/dev/tcp/localhost/8080) 2>/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s
    networks:
      - backend

  eureka-server:
    image: demo20/eureka-server:latest
    ports:
      - "8070:8070"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8070/actuator/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s
    networks:
      - backend

  organization-service:
    image: demo20/organization-service:latest
    ports:
      - "8073:8073"
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - backend

  web-frontend:
    image: demo20/web-frontend:latest
    ports:
      - "8074:8074"
    depends_on:
      eureka-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - backend

  gateway-server:
    image: demo20/gateway-server:latest
    ports:
      - "8072:8072"
      - "8079:8079"
    depends_on:
      eureka-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - backend

  tempo:
    image: grafana/tempo:latest
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3200/ready || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - backend

  loki:
    image: grafana/loki:2.9.10
    command: ["-config.file=/etc/loki/loki.yaml"]
    volumes:
      - ./loki.yaml:/etc/loki/loki.yaml
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - backend

  promtail:
    image: grafana/promtail:2.9.10
    command: ["-config.file=/etc/promtail/promtail.yaml"]
    volumes:
      - ./promtail.yaml:/etc/promtail/promtail.yaml
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - backend

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3000:3000"
    depends_on:
      tempo:
        condition: service_healthy
      loki:
        condition: service_healthy
    networks:
      - backend

networks:
  backend:
    driver: bridge
